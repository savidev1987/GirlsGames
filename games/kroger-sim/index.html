<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kroger Worker Sim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
    #canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
      padding: 12px 16px; display: flex; justify-content: space-between; align-items: flex-start;
    }
    #btn-home {
      position: fixed; top: 12px; left: 12px; z-index: 200;
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.4);
      color: #fff; font-size: 13px; font-weight: bold; padding: 6px 12px;
      border-radius: 20px; cursor: pointer; text-decoration: none;
      backdrop-filter: blur(4px);
    }
    #btn-home:hover { background: rgba(255,255,255,0.25); }

    #level-badge {
      background: #e31837; color: #fff; padding: 6px 14px; border-radius: 20px;
      font-size: 15px; font-weight: bold; letter-spacing: 1px;
    }
    #timer-wrap { text-align: right; }
    #timer-label { color: #fff; font-size: 11px; margin-bottom: 3px; }
    #timer-bar-bg { width: 140px; height: 14px; background: #333; border-radius: 7px; overflow: hidden; }
    #timer-bar { height: 100%; width: 100%; background: #4caf50; border-radius: 7px; transition: background 0.3s; }

    /* Task card */
    #task-card {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); border-radius: 14px; padding: 10px 18px;
      font-size: 14px; color: #222; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      max-width: 280px; text-align: center; pointer-events: none;
      border-left: 5px solid #e31837;
    }
    #task-card .who { font-size: 11px; color: #888; margin-bottom: 2px; }
    #task-card .what { font-weight: bold; font-size: 15px; }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    /* D-pad */
    #dpad {
      position: fixed; bottom: 30px; left: 30px;
      width: 130px; height: 130px; display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4px;
    }
    .dpad-btn {
      background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; user-select: none; -webkit-user-select: none;
      touch-action: none; color: #fff;
      transition: background 0.1s;
    }
    .dpad-btn:active, .dpad-btn.pressed { background: rgba(227,24,55,0.6); }
    #btn-up    { grid-area: up; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-down  { grid-area: down; }

    /* Action button */
    #btn-action {
      position: fixed; bottom: 50px; right: 30px;
      width: 70px; height: 70px; border-radius: 50%;
      background: #e31837; border: 3px solid #fff;
      color: #fff; font-size: 13px; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(227,24,55,0.5);
      touch-action: none; user-select: none;
    }
    #btn-action:active { transform: scale(0.93); }

    /* Notification toast */
    #toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 14px 28px;
      border-radius: 16px; font-size: 18px; font-weight: bold;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center;
    }

    /* Start screen */
    #start-screen {
      position: fixed; inset: 0; background: #e31837;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; z-index: 100;
    }
    #start-screen h1 { font-size: 32px; margin-bottom: 6px; }
    #start-screen p  { font-size: 15px; opacity: 0.85; margin-bottom: 30px; max-width: 280px; text-align: center; }
    #start-screen button {
      background: #fff; color: #e31837; border: none; padding: 14px 36px;
      border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <h1>🛒 Kroger Worker</h1>
  <p>Help customers, restock shelves, and run the checkout — before time runs out!</p>
  <button id="btn-start">Start Shift!</button>
</div>

<a id="btn-home" href="../../index.html">🏠 Home</a>
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="level-badge">LEVEL 1</div>
  <div id="timer-wrap">
    <div id="timer-label">Customer patience</div>
    <div id="timer-bar-bg"><div id="timer-bar"></div></div>
  </div>
</div>

<div id="task-card">
  <div class="who">Customer says:</div>
  <div class="what" id="task-text">Loading...</div>
</div>

<div id="crosshair"></div>

<!-- D-pad -->
<div id="dpad">
  <button class="dpad-btn" id="btn-up">▲</button>
  <button class="dpad-btn" id="btn-left">◀</button>
  <button class="dpad-btn" id="btn-right">▶</button>
  <button class="dpad-btn" id="btn-down">▼</button>
</div>

<button id="btn-action">HELP</button>

<div id="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="game.js"></script>
</body>
</html>
